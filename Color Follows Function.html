document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

round:var(--surface);color:var(--text-2);font-size:11px;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0\" style-hover=\"background:var(--surface-3);color:var(--text)\">×<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:4px\">\n            <button onclick=\"{{ sw.onEdit }}\" title=\"編集\" style=\"font-family:'Geist Mono',monospace;font-size:10px;color:var(--text-2);background:transparent;border:none;cursor:pointer;padding:0;letter-spacing:0.02em\" style-hover=\"color:var(--text)\">{{ sw.hex }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n      <button onclick=\"{{ openAdd }}\" title=\"色を追加\" style=\"flex:none;width:50px;height:50px;border-radius:6px;border:1.5px dashed var(--border-strong);background:transparent;color:var(--text-2);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1;margin-top:0\" style-hover=\"border-color:var(--text);color:var(--text)\">+<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:18px;padding:9px 22px 13px;border-top:1px solid var(--border);flex-wrap:wrap\">\n      <div style=\"display:flex;align-items:center;gap:22px;flex-wrap:wrap\">\n        <div style=\"display:flex;align-items:center;gap:9px\">\n          <span style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3)\">単位<\u002Fspan>\n          <div style=\"display:inline-flex;border:1px solid var(--border-strong);border-radius:6px;overflow:hidden\">\n            <sc-for list=\"{{ unitSegs }}\" as=\"u\" hint-placeholder-count=\"3\">\n              <button onclick=\"{{ u.onClick }}\" style=\"padding:6px 14px;font-size:12.5px;font-weight:{{ u.weight }};border:none;border-right:{{ u.divider }};background:{{ u.bg }};color:{{ u.fg }};cursor:pointer;font-family:inherit\">{{ u.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:9px\">\n          <span style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.16em;text-transform:uppercase;color:var(--text-3)\">観点<\u002Fspan>\n          <div style=\"display:inline-flex;border:1px solid var(--border-strong);border-radius:6px;overflow:hidden\">\n            <sc-for list=\"{{ perSegs }}\" as=\"p\" hint-placeholder-count=\"2\">\n              <button onclick=\"{{ p.onClick }}\" style=\"padding:6px 14px;font-size:12.5px;font-weight:{{ p.weight }};border:none;border-right:{{ p.divider }};background:{{ p.bg }};color:{{ p.fg }};cursor:pointer;font-family:inherit\">{{ p.label }}<\u002Fbutton>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;align-items:center;gap:8px\">\n        <span style=\"font-family:'Geist Mono',monospace;font-size:10px;color:var(--text-3)\">{{ paletteCountLabel }}<\u002Fspan>\n        <button onclick=\"{{ askClear }}\" style=\"font-size:12px;padding:6px 12px;border:1px solid var(--border-strong);background:transparent;color:var(--text-2);border-radius:5px;cursor:pointer;font-family:inherit;white-space:nowrap\" style-hover=\"background:var(--surface-2);color:var(--text)\">すべて消去<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- ===================== TOAST ===================== -->\n  <sc-if value=\"{{ toastShow }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:fixed;left:50%;bottom:148px;transform:translateX(-50%);background:var(--text);color:var(--bg);padding:9px 16px;border-radius:7px;font-size:12.5px;font-weight:500;z-index:40;animation:cffToast .2s ease both;box-shadow:0 8px 24px rgba(0,0,0,0.18)\">{{ toast }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== PICKER ===================== -->\n  <sc-if value=\"{{ picker.open }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ picker.cancel }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;animation:cffIn .15s ease both\">\n      <div onclick=\"{{ picker.stop }}\" style=\"width:380px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:0 24px 64px rgba(0,0,0,0.28);overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)\">\n          <span style=\"font-weight:700;font-size:14px\">{{ picker.title }}<\u002Fspan>\n          <button onclick=\"{{ picker.cancel }}\" style=\"width:26px;height:26px;border-radius:5px;border:1px solid var(--border-strong);background:transparent;color:var(--text-2);cursor:pointer;font-size:14px;line-height:1\" style-hover=\"background:var(--surface-2)\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px\">\n          <div style=\"height:84px;border-radius:7px;border:1px solid var(--border-strong);background:{{ picker.hex }};margin-bottom:16px\"><\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px;margin-bottom:16px\">\n            <span style=\"font-family:'Geist Mono',monospace;font-size:10px;letter-spacing:0.12em;color:var(--text-3);text-transform:uppercase\">HEX<\u002Fspan>\n            <input value=\"{{ picker.hexInput }}\" onchange=\"{{ picker.onHex }}\" oninput=\"{{ picker.onHex }}\" style=\"flex:1;font-family:'Geist Mono',monospace;font-size:15px;padding:8px 11px;border:1px solid var(--border-strong);border-radius:6px;background:var(--bg);color:var(--text);letter-spacing:0.02em\">\n          <\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:14px;margin-bottom:20px\">\n            <div>\n              <div style=\"display:flex;justify-content:space-between;margin-bottom:5px\"><span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-2)\">H 色相<\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:12px;font-weight:500\">{{ picker.H }}°<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"360\" value=\"{{ picker.H }}\" oninput=\"{{ picker.onH }}\" style=\"width:100%;accent-color:var(--text);background:transparent\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;margin-bottom:5px\"><span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-2)\">S 彩度<\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:12px;font-weight:500\">{{ picker.S }}%<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ picker.S }}\" oninput=\"{{ picker.onS }}\" style=\"width:100%;accent-color:var(--text)\">\n            <\u002Fdiv>\n            <div>\n              <div style=\"display:flex;justify-content:space-between;margin-bottom:5px\"><span style=\"font-family:'Geist Mono',monospace;font-size:11px;color:var(--text-2)\">V 明度<\u002Fspan><span style=\"font-family:'Geist Mono',monospace;font-size:12px;font-weight:500\">{{ picker.V }}%<\u002Fspan><\u002Fdiv>\n              <input type=\"range\" min=\"0\" max=\"100\" value=\"{{ picker.V }}\" oninput=\"{{ picker.onV }}\" style=\"width:100%;accent-color:var(--text)\">\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <sc-if value=\"{{ picker.canDelete }}\" hint-placeholder-val=\"{{ false }}\">\n              <button onclick=\"{{ picker.del }}\" style=\"font-size:12.5px;padding:9px 13px;border:1px solid var(--border-strong);background:transparent;color:var(--text-2);border-radius:6px;cursor:pointer;font-family:inherit\" style-hover=\"background:var(--surface-2);color:var(--text)\">削除<\u002Fbutton>\n            <\u002Fsc-if>\n            <div style=\"flex:1\"><\u002Fdiv>\n            <button onclick=\"{{ picker.cancel }}\" style=\"font-size:12.5px;padding:9px 15px;border:1px solid var(--border-strong);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit\" style-hover=\"background:var(--surface-2)\">キャンセル<\u002Fbutton>\n            <button onclick=\"{{ picker.apply }}\" style=\"font-size:12.5px;font-weight:600;padding:9px 17px;border:1px solid var(--text);background:var(--text);color:var(--bg);border-radius:6px;cursor:pointer;font-family:inherit\">{{ picker.applyLabel }}<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== CONFIRM ===================== -->\n  <sc-if value=\"{{ confirmOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ cancelConfirm }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.32);z-index:55;display:flex;align-items:center;justify-content:center;padding:24px;animation:cffIn .15s ease both\">\n      <div onclick=\"{{ picker.stop }}\" style=\"width:360px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:0 24px 64px rgba(0,0,0,0.28);padding:22px\">\n        <div style=\"font-weight:700;font-size:15px;margin-bottom:8px\">すべての色を消去しますか？<\u002Fdiv>\n        <div style=\"font-size:13px;color:var(--text-2);line-height:1.55;margin-bottom:20px\">パレットの全 {{ paletteCount }} 色が削除されます。この操作は元に戻せません。<\u002Fdiv>\n        <div style=\"display:flex;justify-content:flex-end;gap:9px\">\n          <button onclick=\"{{ cancelConfirm }}\" style=\"font-size:12.5px;padding:9px 15px;border:1px solid var(--border-strong);background:transparent;color:var(--text);border-radius:6px;cursor:pointer;font-family:inherit\" style-hover=\"background:var(--surface-2)\">キャンセル<\u002Fbutton>\n          <button onclick=\"{{ doClear }}\" style=\"font-size:12.5px;font-weight:600;padding:9px 17px;border:1px solid var(--text);background:var(--text);color:var(--bg);border-radius:6px;cursor:pointer;font-family:inherit\">消去する<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ===================== HELP ===================== -->\n  <sc-if value=\"{{ helpOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeHelp }}\" style=\"position:fixed;inset:0;background:rgba(0,0,0,0.28);z-index:60;display:flex;align-items:center;justify-content:center;padding:24px;animation:cffIn .15s ease both\">\n      <div onclick=\"{{ picker.stop }}\" style=\"width:400px;max-width:100%;background:var(--surface);border:1px solid var(--border);border-radius:9px;box-shadow:0 24px 64px rgba(0,0,0,0.28);overflow:hidden\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;padding:15px 18px;border-bottom:1px solid var(--border)\">\n          <div style=\"display:flex;align-items:center;gap:9px\">\n            <span style=\"width:18px;height:18px;border-radius:50%;border:1.5px solid var(--text);color:var(--text);display:inline-flex;align-items:center;justify-content:center;font-family:'Geist Mono',monospace;font-size:11px\">?<\u002Fspan>\n            <span style=\"font-weight:700;font-size:14px\">{{ help.title }}<\u002Fspan>\n          <\u002Fdiv>\n          <button onclick=\"{{ closeHelp }}\" style=\"width:26px;height:26px;border-radius:5px;border:1px solid var(--border-strong);background:transparent;color:var(--text-2);cursor:pointer;font-size:14px;line-height:1\" style-hover=\"background:var(--surface-2)\">×<\u002Fbutton>\n        <\u002Fdiv>\n        <div style=\"padding:18px\">\n          <div style=\"font-size:13.5px;line-height:1.65;color:var(--text);margin-bottom:16px\">{{ help.body }}<\u002Fdiv>\n          <div style=\"padding:12px 14px;background:var(--surface-2);border-radius:6px;border:1px solid var(--border)\">\n            <div style=\"font-family:'Geist Mono',monospace;font-size:9px;letter-spacing:0.14em;text-transform:uppercase;color:var(--text-3);margin-bottom:5px\">目安<\u002Fdiv>\n            <div style=\"font-family:'Geist Mono',monospace;font-size:12.5px;color:var(--text)\">{{ help.guide }}<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    theme: 'light',\n    unit: 'pair',\n    perspective: 'verify',\n    palette: ['#1F2933', '#2D6CDF', '#E4572E', '#1B998B', '#E8C547'],\n    selected: 0, fg: 0, bg: 4,\n    pickerOpen: false, pickerIndex: null, pickerIsNew: false,\n    draftH: 210, draftS: 70, draftV: 60, hexInput: '#2D6CDF',\n    confirmOpen: false,\n    helpOpen: false, helpKey: null,\n    toast: null,\n  };\n\n  componentDidMount() {\n    try {\n      const h = decodeURIComponent((location.hash || '').replace(/^#/, ''));\n      const m = h.match(/p=([0-9a-fA-F,]+)/);\n      if (m) {\n        const cols = m[1].split(',').filter(x => /^[0-9a-fA-F]{6}$/.test(x)).map(x => '#' + x.toUpperCase());\n        if (cols.length) this.setState({ palette: cols, selected: 0, fg: 0, bg: Math.min(1, cols.length - 1) });\n      }\n    } catch (e) {}\n  }\n\n  // ---------- color math ----------\n  clamp(v, a, b) { return Math.max(a, Math.min(b, v)); }\n  hexToRgb(hex) {\n    let h = (hex || '').replace('#', '').trim();\n    if (h.length === 3) h = h.split('').map(c => c + c).join('');\n    if (h.length !== 6 || /[^0-9a-fA-F]/.test(h)) return { r: 0, g: 0, b: 0 };\n    const n = parseInt(h, 16);\n    return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };\n  }\n  rgbToHex(r, g, b) {\n    return '#' + [r, g, b].map(v => this.clamp(Math.round(v), 0, 255).toString(16).padStart(2, '0')).join('').toUpperCase();\n  }\n  lin(c) { c /= 255; return c <= 0.04045 ? c / 12.92 : Math.pow((c + 0.055) / 1.055, 2.4); }\n  luminance(hex) { const { r, g, b } = this.hexToRgb(hex); return 0.2126 * this.lin(r) + 0.7152 * this.lin(g) + 0.0722 * this.lin(b); }\n  contrast(h1, h2) {\n    const L1 = this.luminance(h1), L2 = this.luminance(h2);\n    const hi = Math.max(L1, L2), lo = Math.min(L1, L2);\n    return (hi + 0.05) / (lo + 0.05);\n  }\n  rgbToHsl(r, g, b) {\n    r /= 255; g /= 255; b /= 255;\n    const max = Math.max(r, g, b), min = Math.min(r, g, b);\n    let h = 0, s = 0, l = (max + min) / 2; const d = max - min;\n    if (d !== 0) {\n      s = l > 0.5 ? d / (2 - max - min) : d / (max + min);\n      switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; default: h = (r - g) / d + 4; }\n      h /= 6;\n    }\n    return { h: h * 360, s: s * 100, l: l * 100 };\n  }\n  rgbToHsv(r, g, b) {\n    r /= 255; g /= 255; b /= 255;\n    const max = Math.max(r, g, b), min = Math.min(r, g, b), d = max - min;\n    let h = 0; const s = max === 0 ? 0 : d / max, v = max;\n    if (d !== 0) { switch (max) { case r: h = (g - b) / d + (g < b ? 6 : 0); break; case g: h = (b - r) / d + 2; break; default: h = (r - g) / d + 4; } h /= 6; }\n    return { h: h * 360, s: s * 100, v: v * 100 };\n  }\n  hsvToRgb(h, s, v) {\n    h = ((h % 360) + 360) % 360; s /= 100; v /= 100;\n    const c = v * s, x = c * (1 - Math.abs((h / 60) % 2 - 1)), m = v - c;\n    let r = 0, g = 0, b = 0;\n    if (h < 60) { r = c; g = x; } else if (h < 120) { r = x; g = c; } else if (h < 180) { g = c; b = x; }\n    else if (h < 240) { g = x; b = c; } else if (h < 300) { r = x; b = c; } else { r = c; b = x; }\n    return { r: (r + m) * 255, g: (g + m) * 255, b: (b + m) * 255 };\n  }\n  hsvToHex(h, s, v) { const { r, g, b } = this.hsvToRgb(h, s, v); return this.rgbToHex(r, g, b); }\n  rgbToXyz(r, g, b) {\n    const R = this.lin(r), G = this.lin(g), B = this.lin(b);\n    return { x: (R * 0.4124 + G * 0.3576 + B * 0.1805) * 100, y: (R * 0.2126 + G * 0.7152 + B * 0.0722) * 100, z: (R * 0.0193 + G * 0.1192 + B * 0.9505) * 100 };\n  }\n  lab(hex) {\n    const { r, g, b } = this.hexToRgb(hex); const { x, y, z } = this.rgbToXyz(r, g, b);\n    const xn = 95.047, yn = 100, zn = 108.883;\n    const f = t => t > 0.008856 ? Math.cbrt(t) : 7.787 * t + 16 / 116;\n    const fx = f(x / xn), fy = f(y / yn), fz = f(z / zn);\n    return { L: 116 * fy - 16, a: 500 * (fx - fy), b: 200 * (fy - fz) };\n  }\n  deltaE(h1, h2) { const a = this.lab(h1), b = this.lab(h2); return Math.sqrt((a.L - b.L) ** 2 + (a.a - b.a) ** 2 + (a.b - b.b) ** 2); }\n  cvd(hex, type) {\n    const { r, g, b } = this.hexToRgb(hex);\n    const M = {\n      prot: [[0.567, 0.433, 0], [0.558, 0.442, 0], [0, 0.242, 0.758]],\n      deut: [[0.625, 0.375, 0], [0.7, 0.3, 0], [0, 0.3, 0.7]],\n      trit: [[0.95, 0.05, 0], [0, 0.433, 0.567], [0, 0.475, 0.525]],\n    }[type];\n    return this.rgbToHex(r * M[0][0] + g * M[0][1] + b * M[0][2], r * M[1][0] + g * M[1][1] + b * M[1][2], r * M[2][0] + g * M[2][1] + b * M[2][2]);\n  }\n  names() {\n    return [\n      { name: '黒', hex: '#000000' }, { name: '白', hex: '#FFFFFF' }, { name: 'グレー', hex: '#808080' },\n      { name: 'チャコール', hex: '#1F2933' }, { name: '赤', hex: '#E4572E' }, { name: '青', hex: '#2D6CDF' },\n      { name: 'ティール', hex: '#1B998B' }, { name: '黄', hex: '#E8C547' }, { name: '緑', hex: '#2E8B57' },\n      { name: 'オレンジ', hex: '#F18F01' }, { name: '紫', hex: '#6A4C93' }, { name: 'ピンク', hex: '#E84393' },\n      { name: 'シアン', hex: '#17A2B8' }, { name: '紺', hex: '#1B263B' }, { name: 'ベージュ', hex: '#D9C5A0' },\n      { name: '茶', hex: '#8B5E3C' }, { name: 'ライム', hex: '#A6CE39' }, { name: 'マゼンタ', hex: '#C0399F' },\n    ];\n  }\n  nearestName(hex) {\n    let best = null, bd = 1e9;\n    for (const n of this.names()) { const d = this.deltaE(hex, n.hex); if (d < bd) { bd = d; best = n; } }\n    return best;\n  }\n  textOn(hex) { return this.contrast(hex, '#FFFFFF') >= this.contrast(hex, '#000000') ? '#FFFFFF' : '#000000'; }\n\n  toast(msg) { this.setState({ toast: msg }); clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: null }), 1600); }\n  copy(text) { try { navigator.clipboard.writeText(text); } catch (e) {} this.toast('コピー: ' + text); }\n  addColorHex(hex) { this.setState(s => ({ palette: [...s.palette, hex.toUpperCase()] })); this.toast('追加: ' + hex.toUpperCase()); }\n  share() {\n    const pal = this.state.palette.map(h => h.replace('#', '')).join(',');\n    const url = location.origin + location.pathname + '#p=' + pal;\n    try { history.replaceState(null, '', '#p=' + pal); } catch (e) {}\n    this.copy(url);\n    this.setState({ toast: '共有リンクをコピーしました' });\n    clearTimeout(this._t); this._t = setTimeout(() => this.setState({ toast: null }), 1800);\n  }\n\n  renderVals() {\n    const S = this.state;\n    const pal = S.palette;\n    const stop = e => { if (e && e.stopPropagation) e.stopPropagation(); };\n\n    // theme\n    const toggleTheme = () => this.setState(s => ({ theme: s.theme === 'light' ? 'dark' : 'light' }));\n    const themeIcon = S.theme === 'light' ? '☾' : '☀';\n\n    // modes\n    const setUnit = u => this.setState({ unit: u });\n    const setPerspective = p => this.setState({ perspective: p });\n    const seg = active => ({ bg: active ? 'var(--text)' : 'transparent', fg: active ? 'var(--bg)' : 'var(--text-2)', weight: active ? '600' : '500', divider: '1px solid var(--border-strong)' });\n    const unitSegs = [{ label: '単色', key: 'single' }, { label: 'ペア', key: 'pair' }, { label: 'パレット', key: 'palette' }]\n      .map((o, i, a) => ({ ...o, ...seg(S.unit === o.key), divider: i < a.length - 1 ? '1px solid var(--border-strong)' : 'none', onClick: () => setUnit(o.key) }));\n    const perSegs = [{ label: '検証', key: 'verify' }, { label: '設計', key: 'design' }]\n      .map((o, i, a) => ({ ...o, ...seg(S.perspective === o.key), divider: i < a.length - 1 ? '1px solid var(--border-strong)' : 'none', onClick: () => setPerspective(o.key) }));\n\n    const showSingle = S.perspective === 'verify' && S.unit === 'single';\n    const showPair = S.perspective === 'verify' && S.unit === 'pair';\n    const showPalette = S.perspective === 'verify' && S.unit === 'palette';\n    const showDesign = S.perspective === 'design';\n    const unitName = { single: '単色', pair: 'ペア', palette: 'パレット' }[S.unit];\n    const perName = { verify: '検証', design: '設計' }[S.perspective];\n    const modeTitle = unitName + ' × ' + perName;\n    const cardCounts = { 'single|verify': 4, 'pair|verify': 3, 'palette|verify': 3, 'design': 2 };\n    const cnt = showDesign ? 2 : cardCounts[S.unit + '|verify'];\n    const cardCountLabel = cnt + ' カード';\n\n    // swatches\n    const clickSwatch = i => {\n      if (S.unit === 'pair') { if (i === S.bg) this.setState({ fg: S.bg, bg: S.fg }); else this.setState({ fg: i }); }\n      else this.setState({ selected: i });\n    };\n    const removeColor = i => this.setState(s => {\n      const p = s.palette.slice(); p.splice(i, 1);\n      const fix = v => Math.max(0, Math.min(v, p.length - 1));\n      return { palette: p, selected: fix(s.selected), fg: fix(s.fg), bg: fix(s.bg) };\n    });\n    const editColor = i => {\n      const c = this.hexToRgb(pal[i]); const v = this.rgbToHsv(c.r, c.g, c.b);\n      this.setState({ pickerOpen: true, pickerIndex: i, pickerIsNew: false, draftH: v.h, draftS: v.s, draftV: v.v, hexInput: pal[i].toUpperCase() });\n    };\n    const swatches = pal.map((hex, i) => {\n      const isFg = S.unit === 'pair' && i === S.fg, isBg = S.unit === 'pair' && i === S.bg;\n      const selSingle = S.unit === 'single' && i === S.selected;\n      const highlighted = selSingle || isFg || isBg;\n      const active = highlighted || S.unit === 'palette' || S.perspective === 'design';\n      return {\n        hex: hex.toUpperCase(), i,\n        badge: isFg ? 'FG' : isBg ? 'BG' : '', badgeShow: isFg || isBg,\n        ring: highlighted ? '0 0 0 2px var(--surface),0 0 0 4px var(--ring)' : 'none',\n        dim: active ? '1' : '0.5',\n        onClick: () => clickSwatch(i), onEdit: () => editColor(i), onRemove: () => removeColor(i),\n      };\n    });\n    const paletteEmpty = pal.length === 0;\n    const paletteCount = pal.length;\n    const paletteCountLabel = pal.length + ' 色';\n\n    // current single\n    const cs = (pal[S.selected] || '#000000');\n    const rgb = this.hexToRgb(cs); const hsl = this.rgbToHsl(rgb.r, rgb.g, rgb.b); const hsv = this.rgbToHsv(rgb.r, rgb.g, rgb.b);\n    const lum = this.luminance(cs); const nm = this.nearestName(cs);\n    const cur = {\n      hex: cs.toUpperCase(),\n      rgb: rgb.r + ', ' + rgb.g + ', ' + rgb.b,\n      hsl: Math.round(hsl.h) + '°, ' + Math.round(hsl.s) + '%, ' + Math.round(hsl.l) + '%',\n      hsv: Math.round(hsv.h) + '°, ' + Math.round(hsv.s) + '%, ' + Math.round(hsv.v) + '%',\n      H: Math.round(hsv.h), S: Math.round(hsv.s), V: Math.round(hsv.v),\n      Hbar: (hsv.h / 360 * 100).toFixed(1) + '%', Sbar: hsv.s.toFixed(1) + '%', Vbar: hsv.v.toFixed(1) + '%',\n      lum: lum.toFixed(4), lumPct: (lum * 100).toFixed(1) + '%',\n      cWhite: this.contrast(cs, '#FFFFFF').toFixed(2), cBlack: this.contrast(cs, '#000000').toFixed(2),\n      name: nm ? nm.name : '—', nameHex: nm ? nm.hex : '', nameDelta: nm ? this.deltaE(cs, nm.hex).toFixed(1) : '—',\n      copyHex: () => this.copy(cs.toUpperCase()),\n      copyRgb: () => this.copy('rgb(' + rgb.r + ', ' + rgb.g + ', ' + rgb.b + ')'),\n      copyHsl: () => this.copy('hsl(' + Math.round(hsl.h) + ', ' + Math.round(hsl.s) + '%, ' + Math.round(hsl.l) + '%)'),\n      copyHsv: () => this.copy('hsv(' + Math.round(hsv.h) + ', ' + Math.round(hsv.s) + '%, ' + Math.round(hsv.v) + '%)'),\n    };\n\n    // hue wheel markers\n    const wheelMarkers = pal.map((hex, i) => {\n      const c = this.hexToRgb(hex); const v = this.rgbToHsv(c.r, c.g, c.b);\n      const ang = (v.h - 90) * Math.PI / 180; const rad = (v.s / 100) * 42;\n      const isCur = i === S.selected;\n      return {\n        hex, left: (50 + Math.cos(ang) * rad).toFixed(1) + '%', top: (50 + Math.sin(ang) * rad).toFixed(1) + '%',\n        size: isCur ? '18px' : '12px',\n        ring: isCur ? '0 0 0 2px var(--surface),0 0 0 4px var(--ring)' : '0 0 0 1.5px var(--surface)',\n      };\n    });\n\n    // pair / wcag\n    const fgHex = (pal[S.fg] || '#000000').toUpperCase(), bgHex = (pal[S.bg] || '#FFFFFF').toUpperCase();\n    const ratio = this.contrast(fgHex, bgHex);\n    const mk = pass => ({ pass, mark: pass ? '✓' : '✕', bg: pass ? 'var(--text)' : 'transparent', fg: pass ? 'var(--bg)' : 'var(--text-3)', border: pass ? 'var(--text)' : 'var(--border-strong)' });\n    const wcag = {\n      ratio: ratio.toFixed(2), fg: fgHex, bg: bgHex,\n      badges: [\n        { label: '通常テキスト AA', sub: '4.5:1', ...mk(ratio >= 4.5) },\n        { label: '通常テキスト AAA', sub: '7:1', ...mk(ratio >= 7) },\n        { label: '大きな文字 AA', sub: '3:1', ...mk(ratio >= 3) },\n        { label: '大きな文字 AAA', sub: '4.5:1', ...mk(ratio >= 4.5) },\n      ],\n      verdict: ratio >= 7 ? 'AAA 準拠' : ratio >= 4.5 ? 'AA 準拠' : ratio >= 3 ? '大字のみ AA' : '不適合',\n      swap: () => this.setState(s => ({ fg: s.bg, bg: s.fg })),\n      copyPair: () => this.copy(fgHex + ' on ' + bgHex + ' — ' + ratio.toFixed(2) + ':1'),\n    };\n    const de = this.deltaE(fgHex, bgHex);\n    const delta = { val: de.toFixed(1), bar: Math.min(100, de).toFixed(0) + '%', label: de < 2 ? 'ほぼ同一' : de < 10 ? 'わずかな差' : de < 25 ? '明確な差' : de < 50 ? '大きな差' : '非常に大きな差' };\n    const cvdRows = [\n      { name: 'P型 (1型)', sub: 'Protanopia', t: 'prot' },\n      { name: 'D型 (2型)', sub: 'Deuteranopia', t: 'deut' },\n      { name: 'T型 (3型)', sub: 'Tritanopia', t: 'trit' },\n    ].map(r => { const f = this.cvd(fgHex, r.t), b = this.cvd(bgHex, r.t); return { name: r.name, sub: r.sub, fg: f, bg: b, ratio: this.contrast(f, b).toFixed(2) }; });\n\n    // palette matrices\n    const palLabels = pal.map(h => ({ hex: h.toUpperCase() }));\n    const matrixReady = pal.length >= 2;\n    const matrixEmpty = pal.length < 2;\n    const matrixCols = '54px repeat(' + pal.length + ', minmax(54px, 1fr))';\n    const dMatrixCols = '30px repeat(' + pal.length + ', minmax(36px, 1fr))';\n    const cRows = pal.map((rh, ri) => ({\n      hex: rh.toUpperCase(),\n      cells: pal.map((ch, ci) => {\n        if (ri === ci) return { val: '—', cellBg: 'var(--surface-2)', fg: 'var(--text-3)', weight: '400', inset: 'none' };\n        const r = this.contrast(rh, ch); const pass = r >= 4.5;\n        return { val: r.toFixed(2), cellBg: 'var(--surface)', fg: pass ? 'var(--text)' : 'var(--text-3)', weight: pass ? '600' : '400', inset: pass ? 'inset 0 0 0 1.5px var(--text)' : 'none' };\n      }),\n    }));\n    const dRows = pal.map((rh, ri) => ({\n      hex: rh.toUpperCase(),\n      cells: pal.map((ch, ci) => {\n        if (ri === ci) return { val: '—', cellBg: 'var(--surface-2)', fg: 'var(--text-3)' };\n        const d = this.deltaE(rh, ch); const close = d < 12;\n        return { val: Math.round(d), cellBg: 'var(--surface)', fg: close ? 'var(--text)' : 'var(--text-3)' };\n      }),\n    }));\n    const huePoints = pal.map(hex => { const c = this.hexToRgb(hex); const v = this.rgbToHsv(c.r, c.g, c.b); return { hex, left: (v.h / 360 * 100).toFixed(1) + '%' }; });\n\n    // design schemes\n    const baseHsv = this.rgbToHsv(rgb.r, rgb.g, rgb.b);\n    const fromH = dh => this.hsvToHex(baseHsv.h + dh, baseHsv.s, baseHsv.v);\n    const wrapC = hex => ({ hex: hex.toUpperCase(), chip: this.textOn(hex) === '#FFFFFF' ? 'rgba(0,0,0,0.45)' : 'rgba(255,255,255,0.6)', chipFg: this.textOn(hex), add: () => this.addColorHex(hex) });\n    const schemes = [\n      { name: '補色', sub: 'Complementary', cols: [cs, fromH(180)] },\n      { name: '類似色', sub: 'Analogous', cols: [fromH(-30), cs, fromH(30)] },\n      { name: 'トライアド', sub: 'Triadic', cols: [cs, fromH(120), fromH(240)] },\n      { name: 'スプリット補色', sub: 'Split-Complementary', cols: [cs, fromH(150), fromH(210)] },\n    ].map(sc => ({ name: sc.name, sub: sc.sub, colors: sc.cols.map(wrapC) }));\n    const tones = [22, 38, 54, 70, 86].map(V => { const hh = this.hsvToHex(baseHsv.h, baseHsv.s, V); return { hex: hh.toUpperCase(), add: () => this.addColorHex(hh) }; });\n\n    // picker\n    const draftHex = this.hsvToHex(S.draftH, S.draftS, S.draftV);\n    const picker = {\n      open: S.pickerOpen, hex: draftHex, hexInput: S.hexInput,\n      H: Math.round(S.draftH), S: Math.round(S.draftS), V: Math.round(S.draftV),\n      title: S.pickerIsNew ? '色を追加' : '色を編集',\n      applyLabel: S.pickerIsNew ? '追加' : '適用',\n      canDelete: !S.pickerIsNew,\n      stop,\n      onH: e => this.setState({ draftH: +e.target.value, hexInput: this.hsvToHex(+e.target.value, S.draftS, S.draftV) }),\n      onS: e => this.setState({ draftS: +e.target.value, hexInput: this.hsvToHex(S.draftH, +e.target.value, S.draftV) }),\n      onV: e => this.setState({ draftV: +e.target.value, hexInput: this.hsvToHex(S.draftH, S.draftS, +e.target.value) }),\n      onHex: e => {\n        const raw = e.target.value; this.setState({ hexInput: raw });\n        const t = raw.trim().replace(/^#/, '');\n        if (/^[0-9a-fA-F]{6}$/.test(t)) { const c = this.hexToRgb(t); const v = this.rgbToHsv(c.r, c.g, c.b); this.setState({ draftH: v.h, draftS: v.s, draftV: v.v }); }\n      },\n      apply: () => this.setState(s => {\n        const p = s.palette.slice();\n        if (s.pickerIsNew) p.push(draftHex); else if (s.pickerIndex != null) p[s.pickerIndex] = draftHex;\n        return { palette: p, pickerOpen: false };\n      }),\n      cancel: () => this.setState({ pickerOpen: false }),\n      del: () => this.setState(s => {\n        const p = s.palette.slice(); if (s.pickerIndex != null) p.splice(s.pickerIndex, 1);\n        const fix = v => Math.max(0, Math.min(v, p.length - 1));\n        return { palette: p, pickerOpen: false, selected: fix(s.selected), fg: fix(s.fg), bg: fix(s.bg) };\n      }),\n    };\n    const openAdd = () => this.setState({ pickerOpen: true, pickerIsNew: true, pickerIndex: null, draftH: 210, draftS: 70, draftV: 60, hexInput: this.hsvToHex(210, 70, 60) });\n\n    // confirm\n    const askClear = () => this.setState({ confirmOpen: true });\n    const cancelConfirm = () => this.setState({ confirmOpen: false });\n    const doClear = () => this.setState({ confirmOpen: false, palette: [], selected: 0, fg: 0, bg: 0 });\n\n    // help\n    const helpMap = {\n      value: { title: '色値', body: '同じ色を RGB・HEX・HSL・HSV など複数の数値表現で表したものです。用途に応じて使い分けます。', guide: 'HEX=#RRGGBB / RGB=0–255 / HSL・HSV=角度と%' },\n      hsv: { title: 'HSV（色相・彩度・明度）', body: '色相(Hue)で色味、彩度(Saturation)で鮮やかさ、明度(Value)で明るさを表す直感的な色空間です。', guide: 'H 0–360° / S 0–100% / V 0–100%' },\n      luminance: { title: '相対輝度', body: '人間が知覚する明るさを 0（黒）〜1（白）で表した値。コントラスト比計算の基礎になります。', guide: '0.0 = 黒  /  1.0 = 白' },\n      wheel: { title: '色相環', body: '色相を円環状に配置した図。中心からの距離が彩度を表し、パレット各色の色相関係を一目で把握できます。', guide: '角度=色相 / 距離=彩度' },\n      name: { title: '最寄り色名', body: '基準色から色差(ΔE)が最も小さい代表色名を表示します。色をことばで説明する際の手がかりになります。', guide: 'ΔE が小さいほど名前に近い' },\n      contrast: { title: 'WCAG コントラスト比', body: '2色の相対輝度の比。文字の可読性基準として WCAG が定義しています。通常テキストは AA 4.5:1・AAA 7:1、大きな文字は AA 3:1・AAA 4.5:1 が目安です。', guide: '1:1（同一）〜 21:1（黒×白）' },\n      deltae: { title: '色差 ΔE', body: '2色の知覚的な違いの大きさ。Lab色空間上の距離で、小さいほど似ています。約2以下で人はほぼ区別できません。', guide: 'ΔE<2 ほぼ同一 / >10 明確な差' },\n      cvd: { title: '色覚シミュレーション', body: 'P型・D型・T型それぞれの色覚での見え方を再現します。特定の色覚でも配色が区別できるかを確認できます。', guide: 'P=赤系 / D=緑系 / T=青系の弱' },\n      cmatrix: { title: 'コントラスト比マトリクス', body: 'パレット全色の総当たりコントラスト比。組み合わせとして使える色ペアを一覧で確認できます。太字が AA 合格です。', guide: '太枠・太字 = 4.5:1 以上' },\n      dmatrix: { title: '色差 ΔE マトリクス', body: 'パレット全色ペアの知覚的な色差。値が小さいペアは紛らわしく、区別しにくい組み合わせです。', guide: '小さい値ほど似ている色ペア' },\n      huedist: { title: '色相分布', body: 'パレット各色の色相を 0–360° の軸上に配置。色相が偏っていないか、バランスを確認できます。', guide: '点が散る=多彩 / 集まる=単調' },\n      harmony: { title: '調和スキーム生成', body: '基準色の色相を回転させ、補色・類似色・トライアドなど色彩理論に基づく配色候補を生成します。', guide: '補色=180° / 類似=±30° / 三分=120°' },\n      tone: { title: 'トーン展開', body: '基準色の色相・彩度を保ち、明度だけを段階的に変えた濃淡（トーン）の展開です。', guide: '明度を 5 段階で展開' },\n    };\n    const mkHelp = k => () => this.setState({ helpOpen: true, helpKey: k });\n    const help = {\n      value: mkHelp('value'), hsv: mkHelp('hsv'), luminance: mkHelp('luminance'), wheel: mkHelp('wheel'),\n      name: mkHelp('name'), contrast: mkHelp('contrast'), deltae: mkHelp('deltae'), cvd: mkHelp('cvd'),\n      cmatrix: mkHelp('cmatrix'), dmatrix: mkHelp('dmatrix'), huedist: mkHelp('huedist'), harmony: mkHelp('harmony'), tone: mkHelp('tone'),\n      title: (helpMap[S.helpKey] || {}).title || '', body: (helpMap[S.helpKey] || {}).body || '', guide: (helpMap[S.helpKey] || {}).guide || '',\n    };\n\n    return {\n      theme: S.theme, themeIcon, toggleTheme, share: () => this.share(),\n      unitSegs, perSegs, showSingle, showPair, showPalette, showDesign, modeTitle, cardCountLabel,\n      swatches, paletteEmpty, paletteCount, paletteCountLabel, openAdd, askClear,\n      cur, wheelMarkers,\n      wcag, delta, cvdRows,\n      palLabels, matrixReady, matrixEmpty, matrixCols, dMatrixCols, cRows, dRows, huePoints,\n      schemes, tones,\n      picker, openAdd,\n      confirmOpen: S.confirmOpen, cancelConfirm, doClear,\n      helpOpen: S.helpOpen, closeHelp: () => this.setState({ helpOpen: false }), help,\n      toast: S.toast, toastShow: !!S.toast,\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
